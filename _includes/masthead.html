<div class="masthead">
  <div class="masthead__inner">
    <nav id="site-nav" class="nav-bar">
      <div class="home-item hidden">
        <a href="{{ '/' | relative_url }}">Homepage</a>
      </div>
      <button id="dropdown-menu" class="button--dropdown hidden" aria-label="Dropdown menu"><span class="navicon"></span></button>
      <ul class="nav-links hidden">
        {% for link in site.data.navigation.main %}
          <li><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
        {% endfor %}
      </ul>
      <button id="theme-toggle" class="button--theme" aria-label="Toggle theme mode">
        <span class="icon-wrapper">
          {% include icon.html name="moon" %}
          {% include icon.html name="sun" %}
        </span>
      </button>
    </nav>
  </div>
</div>

<div id="dropdown-overlay" class="dropdown-overlay"></div>
